<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivos Web</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Configuración Tailwind para Modo Oscuro -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gf-bg': '#0f0f11',
                        'gf-surface': '#1b1b1d',
                        'gf-surface-2': '#2d2d30',
                        'gf-primary': '#a8c7fa',
                        'gf-text': '#e3e3e3',
                        'gf-text-sec': '#c4c7c5',
                        'gf-icon-bg': '#333537',
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f0f11; color: #e3e3e3; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilos tabla Excel oscura */
        .excel-table table { width: 100%; border-collapse: collapse; background: #1b1b1d; color: #e3e3e3; }
        .excel-table th, .excel-table td { border: 1px solid #333; padding: 0.5rem; text-align: left; }
        .excel-table th { background-color: #2d2d30; }

        /* Custom selection color para el editor */
        .editor-textarea::selection {
            background-color: rgba(168, 199, 250, 0.3);
        }
    </style>
</head>
<body class="font-sans h-screen flex justify-center overflow-hidden selection:bg-blue-500/30">

    <!-- Contenedor Principal -->
    <div class="w-full max-w-md h-full flex flex-col relative bg-gf-bg shadow-2xl overflow-hidden">
        
        <!-- VISTA 1: INICIO (Dashboard) -->
        <div id="home-view" class="flex-1 flex flex-col h-full overflow-y-auto hide-scrollbar pb-24">
            
            <!-- Buscador Superior -->
            <div class="px-4 pt-4 pb-2 sticky top-0 bg-gf-bg z-10">
                <div class="bg-gf-surface-2 rounded-full flex items-center px-4 py-3 gap-3">
                    <button onclick="toggleSidebar()" class="text-gf-text hover:text-white transition-colors">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <input type="text" placeholder="Buscar en archivos" class="flex-1 bg-transparent border-none focus:outline-none text-gf-text placeholder-gf-text-sec text-base" disabled>
                    <button class="text-gf-text-sec">
                        <i class="ph ph-magnifying-glass text-2xl"></i>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold ml-1">U</div>
                </div>
            </div>

            <!-- Recientes -->
            <div class="mt-4">
                <div class="flex justify-between items-center px-5 mb-3">
                    <h2 class="text-lg font-medium text-gf-text">Recientes</h2>
                    <button class="text-gf-primary text-sm font-medium">Ver todo</button>
                </div>
                <div class="flex overflow-x-auto hide-scrollbar px-5 gap-3 pb-2">
                    <div class="w-32 h-40 bg-gf-surface rounded-2xl flex-shrink-0 flex flex-col justify-center items-center text-gf-text-sec border border-gray-800">
                        <i class="ph ph-image text-3xl mb-2"></i><span class="text-xs">Sin recientes</span>
                    </div>
                    <div class="w-32 h-40 bg-gf-surface rounded-2xl flex-shrink-0 flex flex-col justify-center items-center text-gf-text-sec border border-gray-800">
                        <i class="ph ph-file-text text-3xl mb-2"></i><span class="text-xs">Sin recientes</span>
                    </div>
                </div>
            </div>

            <!-- Categorías -->
            <div class="mt-6 px-5">
                <h2 class="text-lg font-medium text-gf-text mb-4">Categorías</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openCategoryFolder('descargas', 'downloads', 'Descargas')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-download-simple text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Descargas</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5" id="status-descargas">Tocar para enlazar</p>
                        </div>
                    </button>
                    <button onclick="openCategoryFolder('imagenes', 'pictures', 'Imágenes')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-image text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Imágenes</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5" id="status-imagenes">Tocar para enlazar</p>
                        </div>
                    </button>
                    <button onclick="openCategoryFolder('videos', 'videos', 'Videos')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-video-camera text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Videos</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5" id="status-videos">Tocar para enlazar</p>
                        </div>
                    </button>
                    <button onclick="openCategoryFolder('documentos', 'documents', 'Documentos')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-file-text text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Documentos</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5" id="status-documentos">Tocar para enlazar</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Almacenamiento -->
            <div class="mt-8 px-5 mb-6">
                <h2 class="text-lg font-medium text-gf-text mb-4">Almacenamiento</h2>
                <button onclick="openCategoryFolder('raiz', '', 'Almacenamiento interno')" class="w-full bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left border border-gray-800">
                    <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                        <i class="ph ph-device-mobile text-xl text-white"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="font-medium text-base truncate text-white" id="storage-title">Almacenamiento interno</h3>
                        <p class="text-xs text-gf-text-sec mt-0.5" id="status-raiz">Tocar para enlazar</p>
                    </div>
                    <i class="ph ph-caret-right text-gf-text-sec text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Botón Flotante Central -->
        <div class="absolute bottom-6 left-0 right-0 flex justify-center z-10">
            <button onclick="openEditorView()" class="w-14 h-14 bg-blue-300 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform text-[#041e49]">
                <i class="ph ph-plus text-2xl font-bold"></i>
            </button>
        </div>

        <!-- VISTA 2: EXPLORADOR DE ARCHIVOS -->
        <div id="explorer-view" class="hidden absolute inset-0 bg-gf-bg flex flex-col z-20 fade-in">
            <header class="h-16 flex items-center px-2 bg-gf-bg border-b border-gray-800 flex-shrink-0">
                <button onclick="closeExplorer()" class="p-3 text-gf-text hover:bg-gf-surface rounded-full transition-colors">
                    <i class="ph ph-arrow-left text-2xl"></i>
                </button>
                <div id="breadcrumbs" class="flex-1 flex items-center overflow-x-auto hide-scrollbar whitespace-nowrap px-2 text-lg font-medium"></div>
                <button onclick="unlinkCurrentFolder()" class="p-3 text-gf-text hover:bg-gf-surface rounded-full transition-colors">
                    <i class="ph ph-link-break text-2xl"></i>
                </button>
            </header>

            <div class="flex-1 overflow-y-auto relative">
                <div id="loading-state" class="hidden absolute inset-0 flex items-center justify-center bg-gf-bg z-10">
                    <div class="animate-spin rounded-full h-10 w-10 border-4 border-gf-surface-2 border-t-gf-primary"></div>
                </div>
                <div id="empty-state" class="hidden flex flex-col items-center justify-center h-full text-gf-text-sec p-6 text-center">
                    <i class="ph ph-folder-open text-6xl mb-4 opacity-50"></i>
                    <p class="text-lg">Carpeta vacía o sin permisos</p>
                </div>
                <div id="file-container" class="divide-y divide-gray-800/50 pb-24"></div>
            </div>
        </div>

        <!-- VISTA 3: EDITOR DE TEXTO (NOTEPAD) -->
        <div id="editor-view" class="hidden absolute inset-0 bg-gf-bg flex flex-col z-40 fade-in">
            <header class="h-16 flex items-center px-4 bg-gf-bg border-b border-gray-800 flex-shrink-0 gap-3">
                <button onclick="closeEditorView()" class="p-2 text-gf-text hover:bg-gf-surface rounded-full transition-colors">
                    <i class="ph ph-x text-2xl"></i>
                </button>
                <div class="flex-1 flex flex-col overflow-hidden">
                    <input type="text" id="editor-filename" placeholder="Nombre del archivo" class="bg-transparent text-white font-medium focus:outline-none text-base border-none p-0 w-full" value="Nota sin título">
                    <span class="text-[10px] text-gf-text-sec uppercase tracking-widest font-bold">Editor de texto</span>
                </div>
                <button onclick="saveFromEditor()" class="bg-gf-primary text-[#041e49] px-5 py-1.5 rounded-full text-sm font-bold shadow-sm hover:brightness-110 active:scale-95 transition-all">
                    Guardar
                </button>
            </header>
            
            <div class="flex-1 flex flex-col overflow-hidden bg-gf-bg p-4">
                <textarea id="editor-textarea" 
                    oninput="updateEditorStats()"
                    spellcheck="false"
                    class="editor-textarea flex-1 w-full bg-transparent text-gf-text font-mono text-sm leading-relaxed focus:outline-none resize-none hide-scrollbar" 
                    placeholder="Empieza a escribir aquí..."></textarea>
            </div>

            <footer class="h-10 bg-gf-surface border-t border-gray-800 px-4 flex items-center justify-between text-[11px] text-gf-text-sec font-mono">
                <div id="editor-stats">Caracteres: 0 | Palabras: 0</div>
                <div id="editor-path-indicator" class="truncate max-w-[50%]">Ruta: Interno/</div>
            </footer>
        </div>

        <!-- SIDEBAR -->
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 z-40 fade-in" onclick="toggleSidebar()"></div>
        <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-[80%] max-w-[320px] bg-gf-surface z-50 transform -translate-x-full transition-transform duration-300 flex flex-col rounded-r-2xl">
            <div class="px-6 py-8 flex items-center gap-3">
                <div class="flex -space-x-2">
                    <div class="w-6 h-8 bg-blue-500 rounded-sm transform rotate-[-10deg]"></div>
                    <div class="w-6 h-8 bg-yellow-400 rounded-sm transform rotate-12 z-10 mix-blend-multiply"></div>
                </div>
                <span class="text-2xl font-medium tracking-wide text-white">Archivos</span>
            </div>
            <nav class="flex-1 px-3 gap-1">
                <button class="w-full flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gf-surface-2 text-gf-text">
                    <i class="ph ph-trash text-2xl"></i>
                    <span class="font-medium">Papelera</span>
                </button>
                <button class="w-full flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gf-surface-2 text-gf-text">
                    <i class="ph ph-gear text-2xl"></i>
                    <span class="font-medium">Configuración</span>
                </button>
            </nav>
        </aside>

        <!-- MODAL VISTA PREVIA -->
        <div id="preview-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/95 p-2 fade-in">
            <div class="w-full h-full flex flex-col relative">
                <header class="flex items-center justify-between p-3 absolute top-0 left-0 right-0 z-10">
                    <button onclick="closePreview()" class="p-2 text-white hover:bg-white/10 rounded-full">
                        <i class="ph ph-arrow-left text-2xl"></i>
                    </button>
                    <h3 id="preview-title" class="font-medium text-white truncate px-4">archivo.ext</h3>
                    <div id="preview-actions" class="flex gap-2">
                        <!-- Aquí se inyecta el botón de Editar si es TXT -->
                    </div>
                </header>
                <div id="preview-content" class="flex-1 flex items-center justify-center overflow-auto pt-16 pb-20"></div>
                <div id="preview-info" class="absolute bottom-0 left-0 right-0 p-4 text-xs text-gray-300 flex justify-center gap-4 pb-8"></div>
            </div>
        </div>

    </div>

    <!-- Script Principal -->
    <script>
        let pathStack = []; 
        let currentEntries = []; 
        let objectUrlToRevoke = null; 
        let currentCategoryName = "Interno";
        let currentCategoryId = null;

        // Estado del Editor
        let editingHandle = null; 

        // --- BASE DE DATOS ---
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('FilesAppDB', 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore('handles');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const saveHandleToDB = async (key, handle) => {
            const db = await initDB();
            const tx = db.transaction('handles', 'readwrite');
            tx.objectStore('handles').put(handle, key);
            updateStatusText(key, "Enlazado");
        };

        const getHandleFromDB = async (key) => {
            const db = await initDB();
            const tx = db.transaction('handles', 'readonly');
            return new Promise(res => {
                const req = tx.objectStore('handles').get(key);
                req.onsuccess = () => res(req.result);
            });
        };

        const deleteHandleFromDB = async (key) => {
            const db = await initDB();
            const tx = db.transaction('handles', 'readwrite');
            tx.objectStore('handles').delete(key);
            updateStatusText(key, "Tocar para enlazar");
        };

        const updateStatusText = (key, text) => {
            const el = document.getElementById(`status-${key}`);
            if (el) el.textContent = text;
        };

        window.addEventListener('DOMContentLoaded', async () => {
            const categories = ['descargas', 'imagenes', 'videos', 'audio', 'documentos', 'raiz'];
            for (const cat of categories) {
                const handle = await getHandleFromDB(cat);
                if (handle) updateStatusText(cat, "Enlazado");
            }
        });

        async function verifyPermission(fileHandle, readWrite) {
            const options = { mode: readWrite ? 'readwrite' : 'read' };
            if ((await fileHandle.queryPermission(options)) === 'granted') return true;
            if ((await fileHandle.requestPermission(options)) === 'granted') return true;
            return false;
        }

        // --- Navegación ---
        const toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        const openExplorer = () => {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('explorer-view').classList.remove('hidden');
        };

        const closeExplorer = () => {
            if (pathStack.length > 1) {
                pathStack.pop();
                readDirectory(pathStack[pathStack.length - 1]);
            } else {
                document.getElementById('explorer-view').classList.add('hidden');
                document.getElementById('home-view').classList.remove('hidden');
                currentCategoryId = null;
            }
        };

        const unlinkCurrentFolder = async () => {
            if (currentCategoryId && confirm(`¿Desvincular "${currentCategoryName}"?`)) {
                await deleteHandleFromDB(currentCategoryId);
                closeExplorer();
            }
        };

        const openCategoryFolder = async (id, startInDir, displayName) => {
            currentCategoryName = displayName;
            currentCategoryId = id;
            let dirHandle = await getHandleFromDB(id);

            try {
                if (dirHandle) {
                    const hasPermission = await verifyPermission(dirHandle, true);
                    if (!hasPermission) dirHandle = null;
                }
                if (!dirHandle) {
                    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await saveHandleToDB(id, dirHandle);
                }
                pathStack = [dirHandle];
                openExplorer();
                await readDirectory(dirHandle);
            } catch (e) { console.log("Picker cancelado"); }
        };

        const readDirectory = async (dirHandle) => {
            const container = document.getElementById('file-container');
            const loading = document.getElementById('loading-state');
            const empty = document.getElementById('empty-state');
            container.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            renderBreadcrumbs();
            try {
                let newEntries = [];
                for await (const entry of dirHandle.values()) newEntries.push(entry);
                newEntries.sort((a, b) => a.kind === b.kind ? a.name.localeCompare(b.name) : (a.kind === 'directory' ? -1 : 1));
                currentEntries = newEntries.map(e => ({ handle: e, name: e.name, kind: e.kind }));
                renderList();
            } catch (e) { empty.classList.remove('hidden'); }
            finally { 
                loading.classList.add('hidden'); 
                if (currentEntries.length === 0) empty.classList.remove('hidden');
            }
        };

        const renderBreadcrumbs = () => {
            const bc = document.getElementById('breadcrumbs');
            bc.innerHTML = '';
            pathStack.forEach((h, i) => {
                const name = i === 0 ? currentCategoryName : h.name;
                const isLast = i === pathStack.length - 1;
                bc.innerHTML += `<button onclick="jumpToPath(${i})" class="${isLast?'text-white':'text-gf-text-sec'} hover:underline truncate max-w-[100px]">${name}</button>`;
                if (!isLast) bc.innerHTML += `<i class="ph ph-caret-right text-gray-600 mx-1"></i>`;
            });
        };

        const jumpToPath = (index) => {
            pathStack = pathStack.slice(0, index + 1);
            readDirectory(pathStack[pathStack.length - 1]);
        };

        const renderList = () => {
            const container = document.getElementById('file-container');
            let html = '';
            currentEntries.forEach((entry, idx) => {
                const isDir = entry.kind === 'directory';
                const icon = isDir ? 
                    `<div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center mr-4"><i class="ph-fill ph-folder text-2xl text-gf-primary"></i></div>` : 
                    getIconForFile(entry.name);
                html += `
                    <button onclick="handleEntryClick(${idx})" class="w-full flex items-center px-4 py-4 hover:bg-gf-surface-2 text-left">
                        ${icon}
                        <div class="flex-1 overflow-hidden pr-4">
                            <h4 class="text-base font-medium text-white truncate">${entry.name}</h4>
                            <p class="text-xs text-gf-text-sec truncate mt-0.5" id="size-${idx}">${isDir ? 'Carpeta' : '...'}</p>
                        </div>
                    </button>`;
            });
            container.innerHTML = html;
            currentEntries.forEach(async (e, idx) => {
                if (e.kind === 'file') {
                    const f = await e.handle.getFile(); e.fileObj = f;
                    const el = document.getElementById(`size-${idx}`);
                    if (el) el.textContent = `${new Date(f.lastModified).toLocaleDateString()} • ${formatBytes(f.size)}`;
                }
            });
        };

        const formatBytes = (b) => {
            if (!+b) return '0 B';
            const k = 1024, s = ['B','KB','MB','GB'], i = Math.floor(Math.log(b)/Math.log(k));
            return `${parseFloat((b/Math.pow(k, i)).toFixed(1))} ${s[i]}`;
        };

        const getIconForFile = (n) => {
            const ext = n.split('.').pop().toLowerCase();
            let c = "text-gray-400", p = "ph-file";
            if (['jpg','png','webp'].includes(ext)) { c = "text-blue-400"; p = "ph-image"; }
            if (['mp4','webm'].includes(ext)) { c = "text-red-400"; p = "ph-video-camera"; }
            if (['pdf','doc','txt'].includes(ext)) { c = "text-orange-400"; p = "ph-file-text"; }
            return `<div class="w-10 h-10 rounded-lg bg-gray-600/10 flex items-center justify-center mr-4"><i class="ph-fill ${p} text-2xl ${c}"></i></div>`;
        };

        const handleEntryClick = async (idx) => {
            const e = currentEntries[idx];
            if (e.kind === 'directory') {
                pathStack.push(e.handle);
                await readDirectory(e.handle);
            } else await previewFile(e);
        };

        // --- Vista Previa ---
        const previewFile = async (entry) => {
            const modal = document.getElementById('preview-modal');
            const content = document.getElementById('preview-content');
            const actions = document.getElementById('preview-actions');
            document.getElementById('preview-title').textContent = entry.name;
            modal.classList.remove('hidden');
            actions.innerHTML = '';
            content.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-2 border-white/20 border-t-white"></div>';
            try {
                const f = entry.fileObj || await entry.handle.getFile();
                const ext = f.name.split('.').pop().toLowerCase();
                if (objectUrlToRevoke) URL.revokeObjectURL(objectUrlToRevoke);
                objectUrlToRevoke = URL.createObjectURL(f);
                document.getElementById('preview-info').innerHTML = `<span>${ext.toUpperCase()}</span><span>${formatBytes(f.size)}</span>`;

                if (['txt','js','css','html','json','md'].includes(ext)) {
                    const text = await f.text();
                    content.innerHTML = `<pre class="w-full h-full p-6 overflow-auto text-xs font-mono text-blue-100 whitespace-pre-wrap">${text.replace(/</g,'&lt;')}</pre>`;
                    actions.innerHTML = `<button onclick="editCurrentFromPreview('${idx}')" class="p-2 bg-white/10 hover:bg-white/20 text-white rounded-full"><i class="ph ph-note-pencil text-2xl"></i></button>`;
                } else if (['jpg','png','webp','gif'].includes(ext)) {
                    content.innerHTML = `<img src="${objectUrlToRevoke}" class="max-w-full max-h-full">`;
                } else if (['mp4','webm'].includes(ext)) {
                    content.innerHTML = `<video src="${objectUrlToRevoke}" controls autoplay class="w-full"></video>`;
                } else {
                    content.innerHTML = `<i class="ph ph-file text-6xl text-gray-600"></i>`;
                }
            } catch (e) { content.innerHTML = `<p>Error al cargar</p>`; }
        };

        const closePreview = () => {
            document.getElementById('preview-modal').classList.add('hidden');
            if (objectUrlToRevoke) { URL.revokeObjectURL(objectUrlToRevoke); objectUrlToRevoke = null; }
        };

        // --- LÓGICA DEL EDITOR (NOTEPAD) ---
        const openEditorView = (handle = null, content = '') => {
            editingHandle = handle;
            const view = document.getElementById('editor-view');
            const filenameInput = document.getElementById('editor-filename');
            const textarea = document.getElementById('editor-textarea');
            const pathIndicator = document.getElementById('editor-path-indicator');

            view.classList.remove('hidden');
            textarea.value = content;
            filenameInput.value = handle ? handle.name : "Nota_" + new Date().getTime() + ".txt";
            
            // Ruta actual
            let pathStr = currentCategoryName + "/";
            if (pathStack.length > 1) pathStr += pathStack.slice(1).map(h => h.name).join("/") + "/";
            pathIndicator.textContent = "Ruta: " + pathStr;

            updateEditorStats();
            setTimeout(() => textarea.focus(), 300);
        };

        const closeEditorView = () => {
            if (document.getElementById('editor-textarea').value.length > 0) {
                if (!confirm("¿Cerrar sin guardar los cambios?")) return;
            }
            document.getElementById('editor-view').classList.add('hidden');
            editingHandle = null;
        };

        const updateEditorStats = () => {
            const text = document.getElementById('editor-textarea').value;
            const charCount = text.length;
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('editor-stats').textContent = `Caracteres: ${charCount} | Palabras: ${wordCount}`;
        };

        const editCurrentFromPreview = async (idx) => {
            const entry = currentEntries[idx];
            const file = await entry.handle.getFile();
            const text = await file.text();
            closePreview();
            openEditorView(entry.handle, text);
        };

        const saveFromEditor = async () => {
            if (pathStack.length === 0) return alert("Primero enlaza una carpeta");
            
            const nameInput = document.getElementById('editor-filename').value.trim();
            const content = document.getElementById('editor-textarea').value;
            if (!nameInput) return alert("El nombre es obligatorio");

            const fileName = nameInput.toLowerCase().endsWith('.txt') ? nameInput : nameInput + ".txt";
            const targetDir = pathStack[pathStack.length - 1];

            try {
                let fileHandle = editingHandle;
                // Si es nuevo, lo creamos
                if (!fileHandle) {
                    fileHandle = await targetDir.getFileHandle(fileName, { create: true });
                }

                const writable = await fileHandle.createWritable();
                await writable.write(content);
                await writable.close();

                alert("Archivo guardado correctamente");
                document.getElementById('editor-view').classList.add('hidden');
                
                // Actualizar lista si estamos en el explorador
                if (!document.getElementById('explorer-view').classList.contains('hidden')) {
                    await readDirectory(targetDir);
                }
            } catch (e) {
                alert("Error al guardar. Asegúrate de tener permisos de escritura.");
            }
        };

    </script>
</body>
</html>
