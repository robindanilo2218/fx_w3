<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivos Web</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Configuración Tailwind para Modo Oscuro (Basado en la captura) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gf-bg': '#0f0f11',        /* Fondo principal (casi negro) */
                        'gf-surface': '#1b1b1d',   /* Fondo de tarjetas/menús */
                        'gf-surface-2': '#2d2d30', /* Fondo de buscador/categorías */
                        'gf-primary': '#a8c7fa',   /* Azul de Google Dark Mode */
                        'gf-text': '#e3e3e3',      /* Texto principal */
                        'gf-text-sec': '#c4c7c5',  /* Texto secundario */
                        'gf-icon-bg': '#333537',   /* Fondo de iconos en categorías */
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f0f11; color: #e3e3e3; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .slide-in { animation: slideIn 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-out { animation: slideOut 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilos tabla Excel oscura */
        .excel-table table { width: 100%; border-collapse: collapse; background: #1b1b1d; color: #e3e3e3; }
        .excel-table th, .excel-table td { border: 1px solid #333; padding: 0.5rem; text-align: left; }
        .excel-table th { background-color: #2d2d30; }
    </style>
</head>
<body class="font-sans h-screen flex justify-center overflow-hidden selection:bg-blue-500/30">

    <!-- Contenedor Principal (Simulando pantalla de móvil en PC, pantalla completa en móviles) -->

        <!-- VISTA 1: INICIO (Dashboard) -->
        <div id="home-view" class="flex-1 flex flex-col h-full overflow-y-auto hide-scrollbar pb-24">
            
            <!-- Buscador Superior -->

                    </button>

                </div>
            </div>

                    <h2 class="text-lg font-medium text-gf-text">Recientes</h2>

                    </div>
                    <div class="w-32 h-40 bg-gf-surface rounded-2xl flex-shrink-0 flex flex-col justify-center items-center text-gf-text-sec border border-gray-800">

            <!-- Categorías -->
            <div class="mt-6 px-5">
                <h2 class="text-lg font-medium text-gf-text mb-4">Categorías</h2>
                <div class="grid grid-cols-2 gap-3">
                    <!-- Botón Categoría -->

                    </button>
                    <button onclick="openFiltered('imagenes')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-image text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Imágenes</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5">--</p>
                        </div>
                    </button>
                    <button onclick="openFiltered('videos')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">

                            <i class="ph ph-video-camera text-xl text-white"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-medium text-sm truncate text-white">Videos</h3>
                            <p class="text-xs text-gf-text-sec mt-0.5">--</p>
                        </div>
                    </button>
                    <button onclick="openFiltered('audio')" class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">

                        </div>

                        </div>
                        <div class="overflow-hidden">

                    <button class="bg-gf-surface rounded-2xl p-4 flex items-center gap-4 hover:bg-gf-surface-2 transition-colors text-left opacity-50">
                        <div class="w-10 h-10 rounded-full bg-gf-icon-bg flex items-center justify-center flex-shrink-0">

        <!-- Botón Flotante Central (Scanner en la foto, aquí Crear Archivo) -->

            </button>
        </div>

        <!-- VISTA 2: EXPLORADOR DE ARCHIVOS (Oculta por defecto) -->
        <div id="explorer-view" class="hidden absolute inset-0 bg-gf-bg flex flex-col z-20 fade-in">
            <!-- Header Navegación -->

                </button>
                <div id="breadcrumbs" class="flex-1 flex items-center overflow-x-auto hide-scrollbar whitespace-nowrap px-2 text-lg font-medium">
                    <!-- Migas de pan dinámicas -->

        <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-[80%] max-w-[320px] bg-gf-surface z-50 transform -translate-x-full transition-transform duration-300 flex flex-col rounded-r-2xl">
            <!-- Logo Fichiers -->

                </div>

            <!-- Menú -->

                <button class="flex flex-col px-4 py-3 rounded-2xl hover:bg-gf-surface-2 transition-colors text-left group">

                <button class="flex flex-col px-4 py-3 rounded-2xl hover:bg-gf-surface-2 transition-colors text-left group">
                    <div class="flex items-center gap-4 text-gf-text group-hover:text-white">

                        <span class="text-base font-medium">Papelera</span>
                    </div>
                    <span class="text-sm text-gf-text-sec ml-10 mt-1">13 MB</span>
                </button>
                
                <div class="h-px bg-gray-800 my-2 mx-4"></div>
                
                <button class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gf-surface-2 transition-colors text-left text-gf-text hover:text-white">
                    <i class="ph ph-gear text-2xl"></i>
                    <span class="text-base font-medium">Configuración</span>
                </button>
                <button class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gf-surface-2 transition-colors text-left text-gf-text hover:text-white">

                </button>
            </nav>

            <div class="p-6 text-sm text-gf-text-sec flex flex-col gap-4">
                <a href="#" class="hover:text-white transition-colors">Política de privacidad</a>
                <a href="#" class="hover:text-white transition-colors">Condiciones de uso</a>
            </div>

        <!-- Modal Vista Previa -->
        <div id="preview-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/95 p-2 fade-in">

                    </button>
                    <h3 id="preview-title" class="font-medium text-white truncate px-4 drop-shadow-md">archivo.ext</h3>
                    <div class="w-10"></div> <!-- Espaciador -->

                <div id="preview-content" class="flex-1 flex items-center justify-center overflow-auto pt-16 pb-20">
                    <!-- Contenido -->

                <div id="preview-info" class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-4 text-xs text-gray-300 flex justify-center gap-4 pb-8">

        <!-- Modal Crear Archivo -->
        <div id="create-file-modal" class="hidden absolute inset-0 z-50 flex items-end justify-center bg-black/60 p-4 pb-8 fade-in">

                <div class="flex items-center mb-4 bg-gf-surface-2 rounded-xl overflow-hidden border border-gray-700 focus-within:border-gf-primary">

                    <span class="px-4 py-3 text-gray-400 bg-gray-800/50">.txt</span>
                </div>
                <textarea id="new-file-content" rows="3" class="w-full bg-gf-surface-2 border border-gray-700 rounded-xl px-4 py-3 mb-6 focus:outline-none focus:border-gf-primary text-white resize-none placeholder-gray-500" placeholder="Escribe algo..."></textarea>

                <div class="flex gap-3">
                    <button onclick="closeCreateFileModal()" class="flex-1 py-3 rounded-full font-medium text-gf-text bg-gf-surface-2 hover:bg-gray-700 transition-colors">Cancelar</button>
                    <button onclick="createNewTextFile()" class="flex-1 py-3 rounded-full font-medium text-gf-bg bg-gf-primary hover:bg-blue-300 transition-colors">Guardar</button>
                </div>

    <!-- Script Principal -->
    <script>
        // --- Estado Global ---
        let rootHandle = null;
        let pathStack = []; 
        let currentEntries = []; 
        let activeFilter = null; // null | 'descargas' | 'imagenes' | 'videos' | 'audio' | 'documentos'
        let objectUrlToRevoke = null; 

        // Verificación de Soporte API
        if (!('showDirectoryPicker' in window)) {
            alert("Tu navegador no soporta la lectura de archivos locales. Usa Chrome en PC o Android moderno.");
        }

        // --- Utilidades ---
        const formatBytes = (bytes) => {
            if (!+bytes) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(1))} ${sizes[i]}`;
        };

        const getIconForFile = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            const css = "text-2xl text-white";
            const bgClass = "w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 mr-4";
            
            if (['jpg','jpeg','png','gif','webp'].includes(ext)) return `<div class="${bgClass} bg-blue-600/20"><i class="ph-fill ph-image ${css} text-blue-400"></i></div>`;
            if (['mp4','webm','mov'].includes(ext)) return `<div class="${bgClass} bg-red-600/20"><i class="ph-fill ph-video-camera ${css} text-red-400"></i></div>`;
            if (['mp3','wav','ogg'].includes(ext)) return `<div class="${bgClass} bg-purple-600/20"><i class="ph-fill ph-music-notes ${css} text-purple-400"></i></div>`;
            if (['pdf','doc','docx','txt'].includes(ext)) return `<div class="${bgClass} bg-orange-600/20"><i class="ph-fill ph-file-text ${css} text-orange-400"></i></div>`;
            if (['xls','xlsx'].includes(ext)) return `<div class="${bgClass} bg-green-600/20"><i class="ph-fill ph-table ${css} text-green-400"></i></div>`;
            if (['zip','rar'].includes(ext)) return `<div class="${bgClass} bg-yellow-600/20"><i class="ph-fill ph-file-archive ${css} text-yellow-400"></i></div>`;
            return `<div class="${bgClass} bg-gray-600/20"><i class="ph-fill ph-file ${css} text-gray-400"></i></div>`;
        };

        const getFileCategory = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return 'imagenes';
            if (['mp4','webm','mov','avi'].includes(ext)) return 'videos';
            if (['mp3','wav','ogg','m4a'].includes(ext)) return 'audio';
            if (['pdf','doc','docx','txt','xls','xlsx','csv'].includes(ext)) return 'documentos';
            return 'otros';
        };

        // --- Navegación UI ---
        const toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        };

        const openExplorer = () => {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('explorer-view').classList.remove('hidden');
        };

        const closeExplorer = () => {
            // Si hay historial de carpetas y no hay filtro, volver atrás
            if (!activeFilter && pathStack.length > 1) {
                pathStack.pop();
                readDirectory(pathStack[pathStack.length - 1]);
            } else {
                // Volver a Home
                document.getElementById('explorer-view').classList.add('hidden');
                document.getElementById('home-view').classList.remove('hidden');
                activeFilter = null;
            }
        };

        // --- Lógica Directorios ---
        const openRootFolder = async () => {
            try {
                const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                rootHandle = dirHandle;
                pathStack = [dirHandle];
                
                // Actualizar info en el Home
                document.getElementById('storage-title').textContent = dirHandle.name;
                document.getElementById('storage-subtitle').textContent = "Conectado y listo";

                activeFilter = null;
                openExplorer();
                await readDirectory(dirHandle);
            } catch (error) {
                console.log("Selección cancelada:", error);
            }
        };

        const openFiltered = async (category) => {
            if (!rootHandle) {
                alert("Primero debes seleccionar 'Todo el almacenamiento' para dar permiso a la web de buscar tus archivos.");
                return;
            }
            activeFilter = category;
            pathStack = [rootHandle]; // Volver a raíz para filtrar
            openExplorer();
            await readDirectory(rootHandle, true); // true = escaneo recursivo limitado
        };

        const readDirectory = async (dirHandle, recursiveScan = false) => {
            const container = document.getElementById('file-container');
            const loading = document.getElementById('loading-state');
            const empty = document.getElementById('empty-state');
            const filterInfo = document.getElementById('filter-info');
            
            container.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            
            if (activeFilter) {
                filterInfo.classList.remove('hidden');
                filterInfo.textContent = `Resultados para: ${activeFilter.toUpperCase()}`;
            } else {
                filterInfo.classList.add('hidden');
            }

            renderBreadcrumbs();

            try {
                let newEntries = [];
                
                if (recursiveScan && activeFilter) {
                    // Escaneo superficial para encontrar archivos por categoría (max 2 niveles por rendimiento web)
                    await scanForCategory(dirHandle, activeFilter, newEntries, 0, 2);
                } else {
                    for await (const entry of dirHandle.values()) {
                        newEntries.push(entry);
                    }
                }

                // Ordenar: Carpetas primero
                newEntries.sort((a, b) => {
                    if (a.kind === b.kind) return a.name.localeCompare(b.name);
                    return a.kind === 'directory' ? -1 : 1;
                });

                currentEntries = newEntries.map(entry => ({ handle: entry, name: entry.name, kind: entry.kind }));
                
                renderList();

            } catch (error) {
                console.error(error);
                empty.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                if (currentEntries.length === 0) empty.classList.remove('hidden');
            }
        };

        const scanForCategory = async (dirHandle, category, resultsArr, currentDepth, maxDepth) => {
            if (currentDepth > maxDepth) return;
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    if (category === 'descargas' || getFileCategory(entry.name) === category) {
                        resultsArr.push(entry);
                    }
                } else if (entry.kind === 'directory') {
                    await scanForCategory(entry, category, resultsArr, currentDepth + 1, maxDepth);
                }
            }
        };

        const renderBreadcrumbs = () => {
            const bc = document.getElementById('breadcrumbs');
            if (activeFilter) {
                bc.innerHTML = `<span class="text-white">${activeFilter.charAt(0).toUpperCase() + activeFilter.slice(1)}</span>`;
                return;
            }
            bc.innerHTML = '';
            pathStack.forEach((handle, i) => {
                const name = i === 0 ? "Interno" : handle.name;
                const isLast = i === pathStack.length - 1;
                bc.innerHTML += `<button onclick="jumpToPath(${i})" class="${isLast?'text-white':'text-gf-text-sec'} hover:underline">${name}</button>`;
                if (!isLast) bc.innerHTML += `<i class="ph ph-caret-right text-gray-600 mx-2"></i>`;
            });
        };

        const jumpToPath = (index) => {
            pathStack = pathStack.slice(0, index + 1);
            readDirectory(pathStack[pathStack.length - 1]);
        };

        const renderList = () => {
            const container = document.getElementById('file-container');
            let html = '';
            
            currentEntries.forEach((entry, idx) => {
                const isDir = entry.kind === 'directory';
                const icon = isDir ? 
                    `<div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center mr-4 flex-shrink-0"><i class="ph-fill ph-folder text-2xl text-gf-primary"></i></div>` : 
                    getIconForFile(entry.name);

                html += `
                    <button onclick="handleEntryClick(${idx})" class="w-full flex items-center px-4 py-4 hover:bg-gf-surface-2 transition-colors text-left focus:outline-none focus:bg-gray-800">
                        ${icon}
                        <div class="flex-1 overflow-hidden pr-4">
                            <h4 class="text-base font-medium text-white truncate">${entry.name}</h4>
                            <p class="text-sm text-gf-text-sec truncate mt-0.5" id="size-${idx}">${isDir ? 'Carpeta' : 'Calculando...'}</p>
                        </div>
                        <i class="ph ph-dots-three-vertical text-xl text-gf-text-sec"></i>
                    </button>
                `;
            });
            container.innerHTML = html;

            // Cargar metadata de archivos async
            currentEntries.forEach(async (entry, idx) => {
                if (entry.kind === 'file') {
                    try {
                        const file = await entry.handle.getFile();
                        entry.fileObj = file;
                        const el = document.getElementById(`size-${idx}`);
                        if (el) el.textContent = `${new Date(file.lastModified).toLocaleDateString()} • ${formatBytes(file.size)}`;
                    } catch(e){}
                }
            });
        };

        const handleEntryClick = async (idx) => {
            const entry = currentEntries[idx];
            if (entry.kind === 'directory') {
                activeFilter = null; // Quitar filtro al entrar a carpeta manual
                pathStack.push(entry.handle);
                await readDirectory(entry.handle);
            } else {
                await previewFile(entry);
            }
        };

        // --- Vista Previa ---
        const previewFile = async (entry) => {
            const modal = document.getElementById('preview-modal');
            const content = document.getElementById('preview-content');
            document.getElementById('preview-title').textContent = entry.name;
            modal.classList.remove('hidden');
            
            content.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-2 border-gray-600 border-t-white"></div>';

            try {
                const file = entry.fileObj || await entry.handle.getFile();
                const ext = file.name.split('.').pop().toLowerCase();
                if (objectUrlToRevoke) URL.revokeObjectURL(objectUrlToRevoke);
                objectUrlToRevoke = URL.createObjectURL(file);

                document.getElementById('preview-info').innerHTML = `<span>${ext.toUpperCase()}</span><span>${formatBytes(file.size)}</span>`;

                if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                    content.innerHTML = `<img src="${objectUrlToRevoke}" class="max-w-full max-h-full object-contain">`;
                } else if (['mp4','webm'].includes(ext)) {
                    content.innerHTML = `<video src="${objectUrlToRevoke}" controls autoplay class="w-full"></video>`;
                } else if (['mp3','wav','ogg'].includes(ext)) {
                    content.innerHTML = `<div class="text-center w-full px-8"><i class="ph-fill ph-music-notes text-6xl text-purple-400 mb-6 block"></i><audio src="${objectUrlToRevoke}" controls autoplay class="w-full"></audio></div>`;
                } else if (['txt','js','css','html','json'].includes(ext)) {
                    const text = await file.text();
                    content.innerHTML = `<pre class="w-full h-full p-4 overflow-auto text-sm font-mono text-green-400 whitespace-pre-wrap">${text.replace(/</g, '&lt;')}</pre>`;
                } else {
                    content.innerHTML = `<div class="text-center text-gray-500"><i class="ph-fill ph-file text-6xl mb-4"></i><p>Sin vista previa nativa</p></div>`;
                }
            } catch (e) {
                content.innerHTML = `<p class="text-red-400">Error al leer archivo</p>`;
            }
        };

        const closePreview = () => {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-content').innerHTML = '';
            if (objectUrlToRevoke) { URL.revokeObjectURL(objectUrlToRevoke); objectUrlToRevoke = null; }
        };

        // --- Crear Archivos ---
        const openCreateFileModal = () => {
            if (!rootHandle) {
                alert("Primero debes conectar 'Todo el almacenamiento' para poder guardar archivos.");
                return;
            }
            document.getElementById('create-file-modal').classList.remove('hidden');
            document.getElementById('new-file-name').value = '';
            document.getElementById('new-file-content').value = '';
        };

        const closeCreateFileModal = () => document.getElementById('create-file-modal').classList.add('hidden');

        const createNewTextFile = async () => {
            const name = document.getElementById('new-file-name').value.trim();
            const content = document.getElementById('new-file-content').value;
            if (!name) return alert("Ponle un nombre");

            const fileName = name.endsWith('.txt') ? name : name + '.txt';
            const targetDir = pathStack.length > 0 ? pathStack[pathStack.length - 1] : rootHandle;

            try {
                const newFileHandle = await targetDir.getFileHandle(fileName, { create: true });
                const writable = await newFileHandle.createWritable();
                await writable.write(content);
                await writable.close();
                closeCreateFileModal();
                
                // Refrescar si estamos en modo explorador
                if (!document.getElementById('explorer-view').classList.contains('hidden')) {
                    await readDirectory(targetDir);
                } else {
                    alert(`Archivo ${fileName} guardado con éxito.`);
                }
            } catch (e) {
                alert("Error al crear archivo. ¿Permisos denegados?");
            }
        };
    </script>
</body>
</html>
